# 粘贴到 /etc/nginx/sites-enabled/stock-api 里 443 端口的 server { } 中，
# 用下面整块替换原有的 location / { ... }（证书等其它块不要动）
#
# 作用：OPTIONS 预检 + POST 响应都由 Nginx 带上 CORS；并 hide 掉 uvicorn 的 CORS，避免重复头导致浏览器拒收。

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://3737-k.info" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, X-Demo-Token" always;
            add_header Access-Control-Max-Age "86400" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        add_header Access-Control-Allow-Origin "https://3737-k.info" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-Demo-Token" always;
    }
