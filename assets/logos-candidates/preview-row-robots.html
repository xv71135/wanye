<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>三只一排机器人 Logo ×10 — 第二轮</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #120a1f; color: #e8e0f0; padding: 24px; max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.25rem; }
    p { color: #9a92a8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-top: 24px; }
    figure { margin: 0; background: #1e1233; padding: 12px; border: 2px solid #5a5468; border-radius: 8px; }
    img { width: 100%; height: auto; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    figcaption { margin-top: 8px; font-size: 0.72rem; color: #5cffd7; line-height: 1.4; }
  </style>
</head>
<body>
  <h1>第二轮：三只 Q 版像素机器人横排（同一视觉 DNA）</h1>
  <p>文件：<code>row_logo_01.png</code> … <code>row_logo_10.png</code>。脚本：<code>scripts/generate_logo_robot_row_batch.py</code></p>
  <div class="grid">
    <figure><img src="row_logo_01.png" alt="01" width="640" height="640"><figcaption><strong>01</strong> 青蓝系 + 黄眼/琥珀胸灯</figcaption></figure>
    <figure><img src="row_logo_02.png" alt="02" width="640" height="640"><figcaption><strong>02</strong> 左中右不同马卡龙 pastel</figcaption></figure>
    <figure><img src="row_logo_03.png" alt="03" width="640" height="640"><figcaption><strong>03</strong> 中间略高「队长」+ 两侧镜像</figcaption></figure>
    <figure><img src="row_logo_04.png" alt="04" width="640" height="640"><figcaption><strong>04</strong> 小领带三只办公喜剧感</figcaption></figure>
    <figure><img src="row_logo_05.png" alt="05" width="640" height="640"><figcaption><strong>05</strong> 小黄安全帽工程小队</figcaption></figure>
    <figure><img src="row_logo_06.png" alt="06" width="640" height="640"><figcaption><strong>06</strong> 手拉手 teamwork</figcaption></figure>
    <figure><img src="row_logo_07.png" alt="07" width="640" height="640"><figcaption><strong>07</strong> 深色剪影 + 霓虹描边</figcaption></figure>
    <figure><img src="row_logo_08.png" alt="08" width="640" height="640"><figcaption><strong>08</strong> 小耳机客服向</figcaption></figure>
    <figure><img src="row_logo_09.png" alt="09" width="640" height="640"><figcaption><strong>09</strong> 轻微跳起开心 pose</figcaption></figure>
    <figure><img src="row_logo_10.png" alt="10" width="640" height="640"><figcaption><strong>10</strong> 金橙珊瑚 + 青绿点缀日落街机感</figcaption></figure>
  </div>
</body>
</html>
