<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logo 候选 ×10 — Agentic Labs</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #120a1f; color: #e8e0f0; padding: 24px; max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.25rem; }
    p { color: #9a92a8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-top: 24px; }
    figure { margin: 0; background: #1e1233; padding: 12px; border: 2px solid #5a5468; border-radius: 8px; }
    img { width: 100%; height: auto; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    figcaption { margin-top: 8px; font-size: 0.75rem; color: #5cffd7; line-height: 1.35; }
    code { background: #2d1f4a; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>10 张 Logo 候选（ComfyUI 像素风）</h1>
  <p>挑一张后复制为 <code>../logo.png</code>，或在 HTML 里改路径。刷新本页可重新对比。</p>
  <div class="grid">
    <figure><img src="logo_candidate_01.png" alt="01" width="640" height="640"><figcaption><strong>01</strong> 对称机器人头吉祥物</figcaption></figure>
    <figure><img src="logo_candidate_02.png" alt="02" width="640" height="640"><figcaption><strong>02</strong> 节点脑 / 网络圆形徽章</figcaption></figure>
    <figure><img src="logo_candidate_03.png" alt="03" width="640" height="640"><figcaption><strong>03</strong> 核心光球 + 轨道环</figcaption></figure>
    <figure><img src="logo_candidate_04.png" alt="04" width="640" height="640"><figcaption><strong>04</strong> 实验烧瓶 + 闪电</figcaption></figure>
    <figure><img src="logo_candidate_05.png" alt="05" width="640" height="640"><figcaption><strong>05</strong> 三小只协作三角阵</figcaption></figure>
    <figure><img src="logo_candidate_06.png" alt="06" width="640" height="640"><figcaption><strong>06</strong> 盾牌 + 电路芯片</figcaption></figure>
    <figure><img src="logo_candidate_07.png" alt="07" width="640" height="640"><figcaption><strong>07</strong> 齿轮 + 火花星</figcaption></figure>
    <figure><img src="logo_candidate_08.png" alt="08" width="640" height="640"><figcaption><strong>08</strong> 菱形四节点神经网络</figcaption></figure>
    <figure><img src="logo_candidate_09.png" alt="09" width="640" height="640"><figcaption><strong>09</strong> 巫师帽 + CPU 芯片趣味吉祥物</figcaption></figure>
    <figure><img src="logo_candidate_10.png" alt="10" width="640" height="640"><figcaption><strong>10</strong> 书本起飞火箭（知识智能体）</figcaption></figure>
  </div>
</body>
</html>
